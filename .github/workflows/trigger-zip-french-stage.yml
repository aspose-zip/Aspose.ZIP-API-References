name: Trigger ZIP French Stage Build

on:
  push:
    branches: [ main ]
    paths: [ 'french/**' ]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: Aspose/apireference.aspose.com
          event-type: build-zip-french-stage
